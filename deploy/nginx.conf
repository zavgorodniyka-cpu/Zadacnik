# Пример для VPS: planner слушает localhost:3000, nginx — снаружи.
# Замените YOUR_DOMAIN на ваш домен (тот же, что был на Vercel).

upstream planner_app {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name YOUR_DOMAIN;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN;

    # certbot: ssl_certificate /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    # certbot: ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    ssl_session_timeout 1d;
    ssl_session_cache shared:PlannerSSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 25m;

    location / {
        proxy_pass http://planner_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }
}
